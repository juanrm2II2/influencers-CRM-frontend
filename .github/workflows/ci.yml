name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://ci-build.invalid
          NEXT_PUBLIC_TOKEN_SALE_ADDRESS: ${{ vars.NEXT_PUBLIC_TOKEN_SALE_ADDRESS || '0x000000000000000000000000000000000000dEaD' }}
          NEXT_PUBLIC_VESTING_ADDRESS: ${{ vars.NEXT_PUBLIC_VESTING_ADDRESS || '0x000000000000000000000000000000000000bEEF' }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail the build on any HIGH/CRITICAL production advisory. MODERATE
      # advisories are surfaced (via `continue-on-error: true`) but do
      # not block the pipeline today — they are all transitive via
      # @metamask/sdk → uuid / @metamask/rpc-errors and cannot be
      # resolved without upstream releases. When those upstreams publish
      # fixes, tighten this to `--audit-level=moderate` and drop the
      # moderate-report step.
      - name: Fail on high/critical production advisories
        run: npm audit --omit=dev --audit-level=high
      - name: Report moderate production advisories (non-blocking)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=moderate

  readiness:
    name: Pre-ICO Readiness Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Report-only by default so adopting the audit does not regress CI.
      # Flip to `--enforce` once open HIGH/MEDIUM findings are closed and
      # the score crosses the `passThreshold` in audit/findings.json.
      - name: Compute audit readiness score (100 - 12H - 4M - 1L)
        run: node scripts/compute-audit-score.mjs
